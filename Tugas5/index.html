<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Sederhana</title>
    <!-- Menggunakan Bootstrap 5 via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-5">
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h1 class="fw-bold">E-Commerse</h1>
                <p class="text-muted">Katalog Produk.</p>
            </div>
        </div>

        <!-- Kontrol: Pencarian dan Filter -->
        <div class="row mb-4 align-items-center bg-white p-3 rounded shadow-sm">
            <div class="col-md-6 mb-3 mb-md-0">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Cari nama produk...">
            </div>
            <div class="col-md-6 d-flex gap-2 flex-wrap" id="filterContainer">
                <button class="btn btn-primary filter-btn" data-category="Semua">Semua</button>
                <button class="btn btn-outline-primary filter-btn" data-category="Elektronik">Elektronik</button>
                <button class="btn btn-outline-primary filter-btn" data-category="Pakaian">Pakaian</button>
                <button class="btn btn-outline-primary filter-btn" data-category="Makanan">Makanan</button>
            </div>
        </div>

        <!-- Tempat produk akan ditampilkan (di-inject via JS) -->
        <div class="row g-4" id="productGrid">
            <!-- Loading state sebelum JS dieksekusi -->
            <div class="col-12 text-center text-muted">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts.js"></script>
</body>
</html>
